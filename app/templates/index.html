<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">Inventory Management</div>
        <div class="nav-items">
            </div>
            <button class="add-button" onclick="showAddForm()">Add Product</button>
        <div>
            <form method="post" class="nav-search-form" action="{{ url_for('products.get_productsbyid') }}">
                <input type="number" name="id" placeholder="Search by ID" required>
                <button type="submit">Search</button>
            </form>
        </div>
        <div>
            <form method="post" class="nav-search-form" action="{{ url_for('products.get_products_bytype') }}">
                <input type="text" name="type" placeholder="Search by Type" required>
                <button type="submit">Search</button>
            </form>
        </div>
         </div>
         <form method="post" action="{{url_for('admin.adminlogout')}}"> 
             <button class="logout-button">Logout</button>
        </form>
        <div>
    </nav>
    <!-- Search Form (Hidden by default) -->
    <div class="search-container" id="searchContainer" style="display: none;">
        <form method="post" class="search-form" id="searchForm">
            <input 
                type="text" 
                name="search_value"
                id="searchInput" 
                placeholder="Search..."
                class="search-input"
            />
            <button type="submit" class="search-button">Search</button>
            <button type="button" class="clear-button" onclick="clearSearch()">Clear</button>
        </form>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="table-container">
            <table class="product-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Type</th>
                        <th>Update</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    {%for d in data%}
                    <tr>
                        {% for i in d %}
                            <td>{{i}}</td>
                        {% endfor %}
                        <td><button id="update-btn" onclick="openUpdateModal(
                            '{{ d[0] }}',
                            '{{ d[2]}}',
                            '{{ d[3] }}'
                            )">Update</button>
                        </td>
                        <td>
                            <form action="{{ url_for('products.delete_products') }}" method="post">
                                <input type="hidden" name="id" value="{{ d[0] }}">
                                <button type="submit" id="delete-btn">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h2>Add New Product</h2>
            <form method="post" action="{{url_for('products.add_products')}}" id="addProductForm">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label>Product Type</label>
                    <input type="text" id="type" name="type" required>
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" step="0.01" name="price" id="addPrice" required>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" name="quantity" id="addQuantity" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-button" onclick="closeAddForm()">Cancel</button>
                    <button type="submit" class="submit-button">Add Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Update Product Modal -->
    <div class="modal" id="updateModal">
        <div class="modal-content">
            <h2>Update Product <span id="updateProductId"></span></h2>
            <form id="updateProductForm" action="{{url_for('products.update_products')}}" method="post">
                 <div class="form-group">
                    <label>Id</label>
                    <input type="number" step="0.01" id="updateId" name="id" required>
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" step="0.01" id="updatePrice" name="price" required>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="updateQuantity" name="quantity" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-button" onclick="closeUpdateForm()">Cancel</button>
                    <button type="submit" class="update-button">Update Product</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        const findByIdUrl = "{{ url_for('products.get_productsbyid') }}";
        const findByTypeUrl = "{{ url_for('products.get_products_bytype') }}";
    </script>
    <script src="{{url_for('static',filename='script.js')}}"></script>
</body>
</html>
